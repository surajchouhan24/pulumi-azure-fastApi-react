name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'fastapi-react-starter/docs/**'
      - 'fastapi-react-starter/mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fastapi-react-starter/docs/requirements.txt

      - name: Deploy to GitHub Pages
        run: fastapi-react-starter/mkdocs gh-deploy --force
