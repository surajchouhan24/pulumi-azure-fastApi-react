  name: CI-CD

on:
  push:
    branches:
      - main

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:

  # =========================================================
  # 1️⃣ CI - Run backend tests
  # =========================================================
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd fastapi-react-starter/backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd fastapi-react-starter/backend
          pytest

  # =========================================================
  # 2️⃣ Build & Push Docker Images
  # =========================================================
  build:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-backend:${{ github.sha }} fastapi-react-starter/backend

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-frontend:${{ github.sha }} fastapi-react-starter/frontend

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:${{ github.sha }}

  # =========================================================
  # 3️⃣ Deploy Infrastructure via Pulumi
  # =========================================================
  deploy-infra:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install infra dependencies
        run: |
          cd infra
          pip install -r requirements.txt

      - name: Pulumi Login
        run: pulumi login

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select stack
        run: pulumi stack select surajchouhan24-org/dev-test
        working-directory: infra

      - name: Preview Infrastructure
        run: pulumi preview
        working-directory: infra

      - name: Deploy Infrastructure
        run: pulumi up --yes --non-interactive
        working-directory: infra

  # =========================================================
  # 4️⃣ Build React with Dynamic API URL
  # =========================================================
  frontend-build:
    needs: deploy-infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Pulumi Login
        run: pulumi login

      - name: Select stack
        run: pulumi stack select surajchouhan24-org/dev-test
        working-directory: infra

      - name: Get API URL from Pulumi
        id: api
        run: |
          API_URL=$(cd infra && pulumi stack output apiUrl)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Install frontend dependencies
        run: |
          cd fastapi-react-starter/frontend
          npm install

      - name: Create env file
        run: |
          cd fastapi-react-starter/frontend
          echo "VITE_API_URL=${{ steps.api.outputs.api_url }}" > .env.production
          cat .env.production

      - name: Build React
        run: |
          cd fastapi-react-starter/frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: fastapi-react-starter/frontend/dist

  # =========================================================
  # 5️⃣ Deploy React to Azure Static Web Apps
  # =========================================================
  frontend-deploy:
    needs: frontend-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Pulumi Login
        run: pulumi login

      - name: Select stack
        run: pulumi stack select surajchouhan24-org/dev-test
        working-directory: infra

      - name: Download React build
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: fastapi-react-starter/frontend/dist

      - name: Get Static Web App token
        id: swa
        run: |
          TOKEN=$(cd infra && pulumi stack output staticWebAppToken)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "fastapi-react-starter/frontend/dist"
          skip_app_build: true