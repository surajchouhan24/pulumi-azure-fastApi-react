name: CI-CD

on:
  push:
    branches:
      - main

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd fastapi-react-starter/backend
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd fastapi-react-starter/backend
          pytest


  build:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fastapi-backend:latest fastapi-react-starter/backend

      - name: Build frontend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest fastapi-react-starter/frontend

      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fastapi-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/react-frontend:latest


  frontend-build:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd fastapi-react-starter/frontend
          npm install

      - name: Build React app
        run: |
          cd fastapi-react-starter/frontend
          echo "VITE_API_URL=https://myapp-dev-test-apia04a0620.azurewebsites.net" > .env.production
          npm run build


  frontend-deploy:
    needs: frontend-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "fastapi-react-starter/frontend"
          output_location: "dist"


  deploy:
    needs: [build, frontend-build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Infra dependencies
        run: |
          cd infra
          pip install -r requirements.txt

      - name: Pulumi Login
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Select stack
        run: pulumi stack select dev-test || pulumi stack init dev-test
        working-directory: infra

      - name: Pulumi Preview
        run: pulumi preview
        working-directory: infra

      - name: Deploy infrastructure
        run: pulumi up --yes --non-interactive --parallel 1
        working-directory: infra